# Agent Orchestrator configuration
# Run /customize to populate the CUSTOMIZE markers.

port: 3000

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [desktop]

projects:
  <!-- CUSTOMIZE: project-id -->:
    name: <!-- CUSTOMIZE: display name -->
    repo: <!-- CUSTOMIZE: owner/repo -->
    path: <!-- CUSTOMIZE: absolute path -->
    defaultBranch: <!-- CUSTOMIZE: main -->
    sessionPrefix: <!-- CUSTOMIZE: short-prefix -->

    tracker:
      plugin: linear
      teamId: "<!-- CUSTOMIZE: linear team uuid -->"
      workspaceSlug: "<!-- CUSTOMIZE: linear workspace slug -->"

    symlinks: [.claude, .env, .env.local]

    agentConfig:
      permissions: skip
      model: claude-opus-4-6

    agentRulesFile: .ao/worker-rules.md

    orchestratorRules: |
      Upstream work (/plan, /design, /refine) happens in regular Claude
      Code sessions and writes results to Linear issue descriptions and
      comments.

      Dispatch workers only for issues labeled "Ready to Build".
      - Never move an issue INTO "Ready to Build" yourself.
      - Never spawn a second worker for an issue with an active session.
      - Max 3 workers in parallel.
      - If a worker reports "insufficient context", move the Linear issue
        to "Blocked" with a comment explaining what is missing and do
        not retry.

    reactions:
      ci-failed:
        auto: true
        action: send-to-agent
        retries: 2
      changes-requested:
        auto: true
        action: send-to-agent
        escalateAfter: 30m
      approved-and-green:
        auto: true
        action: notify
        priority: action
      agent-stuck:
        threshold: 15m
        action: notify
